# Netlify configuration for Frotzsmith
# Static Nuxt 4 build (ssr: false). On Netlify, Nitro's Netlify preset writes the
# static site to `dist` (locally `dist` is a symlink to `.output/public`), so we
# publish `dist`. Headers/CSP can be tightened later (see docs/06-security.md §9).

[build]
  command = "yarn generate"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# NOTE on redirects: on Netlify this build runs Nitro's netlify preset, which
# emits its own `_redirects` catch-all — [[redirects]] blocks here are
# SHADOWED by it and never match (verified live 2026-07-09; headers below DO
# apply). Custom rules therefore live in `public/_redirects` (the Plausible
# first-party proxy), where Nitro appends its catch-all after them.

# Security headers, tuned so the in-browser toolchain actually works:
#  - X-Frame-Options SAMEORIGIN: the IDE embeds the Parchment player in a
#    same-origin <iframe> (DENY would block it).
#  - 'wasm-unsafe-eval': inform6.wasm (the compiler).
#  - 'unsafe-eval': the ZVM player is a JIT — it compiles z-code to JS at runtime.
#  - 'unsafe-inline': the player page's inline init + styles.
#  - blob:: the compiled story is handed to the player as a blob URL.
# Loose by necessity for a client-side compiler+interpreter; tighten with
# nonces/hashes per docs/06-security.md §9. No secrets or backend are at risk.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' blob:; worker-src 'self' blob:; frame-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"

# Long-cache content-hashed build assets (WASM, interpreter, JS/CSS).
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# EXCEPT Nuxt's app manifest: it is unfingerprinted and polled to detect new
# deploys / recover from stale-chunk errors — immutable-caching it broke that
# for long-lived sessions. (Later rules override earlier ones on Netlify.)
[[headers]]
  for = "/_nuxt/builds/*"
  [headers.values]
    Cache-Control = "no-cache"

# The .NET ZILF bundle lives under a compiler-revision path
# (/zilf/r<rev>/_framework, see ZILF_FRAMEWORK_BASE), so it can be immutable:
# a rebuild lands under a new path and propagates instantly, and the old
# stale-dotnet.js → SPA-fallback cache-poisoning edge is gone.
[[headers]]
  for = "/zilf/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Vendored Parchment player assets: unfingerprinted but change rarely; a week
# of caching kills the ~6 conditional round-trips on every compile→play.
[[headers]]
  for = "/play/web/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
