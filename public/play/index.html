<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Frotzsmith — Play</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0">
<script src="web/jquery.min.js"></script>
<script src="web/ie.js" nomodule></script>
<script>
  // The compiled story is handed in as a (blob) URL via ?story=… so this one
  // page can play any game. Falls back to the bundled demo when opened directly.
  var __params = new URLSearchParams(location.search);
  // Match the IDE's light/dark theme (passed in via ?theme=).
  if (__params.get('theme') === 'dark') document.documentElement.classList.add('frotz-dark');
  // Security (audit 2026-06-30): only accept a same-origin blob: story URL — the
  // IDE's own compiled output. Reject data:/http(s)/external URLs so a crafted link
  // can't deliver an attacker-controlled Z-machine binary into the player/JIT.
  var __story = __params.get('story');
  if (!__story || __story.slice(0, 5) !== 'blob:') __story = '/play/demo.z5';
  parchment_options = { default_story: [__story], lib_path: 'web/' };
</script>
<script src="web/main.js" type="module"></script>
<link rel="stylesheet" href="web/web.css">
<style>
  /* Frotzsmith: parchment tint (not pure white/black), edge-to-edge, theme-aware. */
  :root {
    --glkote-buffer-bg: #f5f1e8; --glkote-buffer-fg: #2a2622;
    --glkote-grid-bg: #efe9da;   --glkote-grid-fg: #2a2622;
  }
  html, body { height: 100%; background: #e7e2d6; }
  /* Fill the right pane edge-to-edge (Parchment centres at 900px by default). */
  #gameport { max-width: none !important; }
  html.frotz-dark {
    --glkote-buffer-bg: #1c1c21; --glkote-buffer-fg: #d7d3c9;
    --glkote-buffer-reverse-bg: #d7d3c9; --glkote-buffer-reverse-fg: #1c1c21;
    --glkote-grid-bg: #15151a;   --glkote-grid-fg: #d7d3c9;
    --glkote-grid-reverse-bg: #d7d3c9; --glkote-grid-reverse-fg: #15151a;
  }
  html.frotz-dark, html.frotz-dark body { background: #101014; }
  /* Force the reading surfaces — the interpreter sets some colours inline. */
  .WindowFrame, .BufferWindow { background-color: #f5f1e8 !important; }
  .BufferWindow { color: #2a2622 !important; }
  html.frotz-dark .WindowFrame, html.frotz-dark .BufferWindow { background-color: #1c1c21 !important; }
  html.frotz-dark .BufferWindow { color: #d7d3c9 !important; }
  /* Typed input + echoed command stay visible on dark (web.css hard-codes #300000). */
  html.frotz-dark .Input { color: #d7d3c9 !important; }
  html.frotz-dark .Style_input { color: #fbbf24 !important; }
  /* Dark scrollbars so no light gutter shows at the edge. */
  html.frotz-dark { scrollbar-color: #3a3a42 #15151a; }
  html.frotz-dark ::-webkit-scrollbar { width: 10px; height: 10px; }
  html.frotz-dark ::-webkit-scrollbar-track { background: #15151a; }
  html.frotz-dark ::-webkit-scrollbar-thumb { background: #3a3a42; border-radius: 5px; }
</style>
</head>
<body>
<div id="gameport">
  <div id="windowport"></div>
  <div id="loadingpane" style="display:none;"><img src="web/waiting.gif" alt="Loading"><br><em>&nbsp;&nbsp;&nbsp;Loading…</em></div>
  <div id="errorpane" style="display:none;"><div id="errorcontent">...</div></div>
</div>
<script>
  // Frotzsmith: report the player's typed commands up to the IDE shell so the
  // Transcript tab can show them. GlkOte line input is <input class="… LineInput">;
  // char-input key prompts ("press a key", [MORE]) are class "CharInput" and are
  // intentionally ignored. Same-origin parent, so postMessage targets our origin.
  (function () {
    var TARGET = location.origin
    window.addEventListener('keydown', function (e) {
      if (window.__frotzScriptRunning) return
      if (e.key !== 'Enter') return
      var el = e.target
      if (!el || el.tagName !== 'INPUT' || !el.classList.contains('LineInput')) return
      var v = (el.value || '').trim()
      if (v) parent.postMessage({ source: 'frotzsmith-play', type: 'command', value: v }, TARGET)
    }, true) // capture phase: read the value before GlkOte clears the field
    // Fresh game booted → ask the shell to start a new transcript.
    parent.postMessage({ source: 'frotzsmith-play', type: 'session-start' }, TARGET)
  })()

  // --- Auto-map capture: post the room (status line) + this turn's new buffer text ---
  var __frotzPrevLineCount = 0
  var __frotzLastRoom = ''
  var __frotzNoRoomPosted = false
  var __frotzEmptyReads = 0
  function __frotzReadRoom() {
    if (window.__frotzScriptRunning) return
    var grid = document.querySelector('.GridWindow')
    if (!grid) return
    var gline = grid.querySelector('.GridLine') // status-line div; skip the window's <style> child
    var line0 = gline ? (gline.textContent || '') : ''
    var name = line0.split(/\s{2,}/)[0].trim()
    if (!name) {
      // Debounce: a game's grid container can render a frame before its first
      // status-line text (one transient empty read on boot). Only conclude "no
      // status line" after several consecutive empties, so games that DO map
      // don't flash the can't-map note.
      if (++__frotzEmptyReads >= 3 && !__frotzNoRoomPosted) {
        __frotzNoRoomPosted = true
        parent.postMessage({ source: 'frotzsmith-play', type: 'no-room' }, location.origin)
      }
      return
    }
    __frotzEmptyReads = 0
    var buffer = document.querySelector('.BufferWindow')
    var blines = buffer ? buffer.querySelectorAll('.BufferLine') : []
    if (blines.length < __frotzPrevLineCount) __frotzPrevLineCount = 0 // screen clear
    var text = ''
    for (var bi = __frotzPrevLineCount; bi < blines.length; bi++) text += (blines[bi].textContent || '') + String.fromCharCode(10)
    // Only post when the room or the buffer changed (coalesce observer bursts).
    if (name === __frotzLastRoom && text.length === 0) return
    __frotzPrevLineCount = blines.length
    __frotzLastRoom = name
    parent.postMessage({ source: 'frotzsmith-play', type: 'room', name: name, text: text }, location.origin)
  }
  var __frotzTimer = 0
  function __frotzScheduleRead() {
    // setTimeout, not rAF: rAF is paused while the Play iframe is hidden (e.g. on
    // the Map tab), so the map would miss moves; setTimeout fires regardless and
    // still coalesces a turn's mutation burst into one read.
    if (__frotzTimer) return
    __frotzTimer = setTimeout(function () { __frotzTimer = 0; __frotzReadRoom() }, 60)
  }
  function __frotzStartMapObserver() {
    var root = document.getElementById('windowport') || document.body
    new MutationObserver(__frotzScheduleRead).observe(root, { childList: true, subtree: true, characterData: true })
    __frotzReadRoom() // initial room before any command
  }
  // Start once GlkOte has built the windows. If the command hook already waits for
  // GlkOte readiness, start there; otherwise poll briefly:
  ;(function waitForWindows(n) {
    if (document.querySelector('.GridWindow')) __frotzStartMapObserver()
    else if (n > 0) setTimeout(function() { waitForWindows(n - 1) }, 120)
  })(30)
</script>
</body>
</html>
