<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Frotzsmith — Play</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0">
<script src="web/jquery.min.js"></script>
<script src="web/ie.js" nomodule></script>
<script>
  // The compiled story is handed in as a (blob) URL via ?story=… so this one
  // page can play any game. Falls back to the bundled demo when opened directly.
  var __params = new URLSearchParams(location.search);
  // Match the IDE's light/dark theme (passed in via ?theme=).
  if (__params.get('theme') === 'dark') document.documentElement.classList.add('frotz-dark');
  parchment_options = { default_story: [__params.get('story') || '/play/demo.z5'], lib_path: 'web/' };
</script>
<script src="web/main.js" type="module"></script>
<link rel="stylesheet" href="web/web.css">
<style>
  /* Frotzsmith: a soft parchment tint instead of pure white/black, theme-aware. */
  :root {
    --glkote-buffer-bg: #f5f1e8; --glkote-buffer-fg: #2a2622;
    --glkote-grid-bg: #efe9da;   --glkote-grid-fg: #2a2622;
  }
  body { background: #e7e2d6; }
  html.frotz-dark {
    --glkote-buffer-bg: #1c1c21; --glkote-buffer-fg: #d7d3c9;
    --glkote-buffer-reverse-bg: #d7d3c9; --glkote-buffer-reverse-fg: #1c1c21;
    --glkote-grid-bg: #15151a;   --glkote-grid-fg: #d7d3c9;
    --glkote-grid-reverse-bg: #d7d3c9; --glkote-grid-reverse-fg: #15151a;
  }
  html.frotz-dark body { background: #101014; }
  /* Force the main reading surfaces — the interpreter sets some colours inline. */
  .WindowFrame, .BufferWindow { background-color: #f5f1e8 !important; }
  .BufferWindow { color: #2a2622 !important; }
  html.frotz-dark .WindowFrame, html.frotz-dark .BufferWindow { background-color: #1c1c21 !important; }
  html.frotz-dark .BufferWindow { color: #d7d3c9 !important; }
</style>
</head>
<body>
<div id="gameport">
  <div id="windowport"></div>
  <div id="loadingpane" style="display:none;"><img src="web/waiting.gif" alt="Loading"><br><em>&nbsp;&nbsp;&nbsp;Loading…</em></div>
  <div id="errorpane" style="display:none;"><div id="errorcontent">...</div></div>
</div>
</body>
</html>
